<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="../../manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <title>Registro Diário - Serviço Antivetorial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background-color: #f8f9fa;
      overflow-x: hidden;
    }

    :root {
      --sb-width: 260px;
      --sb-accent: #4f6ef7;
      --sb-accent-light: #eef1ff;
      --sb-border: #e2e8f0;
      --sb-text: #2d3748;
      --sb-muted: #718096;
    }

    .sidebar {
      width: var(--sb-width);
      background: #fff;
      border-right: 0.5px solid var(--sb-border);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      transform: translateX(0);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      z-index: 1000;
    }
    .sidebar.hidden { transform: translateX(calc(-1 * var(--sb-width))); }

    .sb-header {
      padding: 1.25rem 1rem 1rem;
      border-bottom: 0.5px solid var(--sb-border);
      display: flex; align-items: center; gap: 10px;
    }
    .sb-title  { font-size: 14px; font-weight: 500; }
    .sb-subtitle { font-size: 11px; color: var(--sb-muted); }
    .sb-close {
      margin-left: auto; width: 28px; height: 28px;
      border-radius: 6px; border: 0.5px solid var(--sb-border);
      background: transparent; cursor: pointer; color: var(--sb-muted);
    }
    .sb-close:hover { background: var(--sb-accent-light); color: var(--sb-accent); }

    .sb-section {
      padding: .75rem .75rem .25rem;
      font-size: 10px; font-weight: 500;
      letter-spacing: .08em; color: var(--sb-muted); text-transform: uppercase;
    }

    .sb-nav {
      flex: 1; padding: .5rem .75rem;
      overflow-y: auto; display: flex;
      flex-direction: column; gap: 2px;
    }
    .sb-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px;
      text-decoration: none; color: var(--sb-text);
      font-size: 13px; transition: background .15s, color .15s;
    }
    .sb-link:hover  { background: var(--sb-accent-light); color: var(--sb-accent); }
    .sb-link.active { background: var(--sb-accent-light); color: var(--sb-accent); font-weight: 500; }

    .sb-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .sb-divider { height: 0.5px; background: var(--sb-border); margin: .5rem .75rem; }

    .sb-footer { padding: .75rem; }
    .sb-logout {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px;
      color: #c53030; font-size: 13px; cursor: pointer;
      border: 0.5px solid #fed7d7; background: #fff5f5;
      transition: background .15s; width: 100%;
    }
    .sb-logout:hover { background: #fed7d7; }

    .menu-toggle {
      position: fixed; top: 12px; left: 12px; z-index: 1100;
      width: 40px; height: 40px; border-radius: 10px;
      border: 0.5px solid var(--sb-border); background: #fff;
      cursor: pointer; transition: left .3s cubic-bezier(.4,0,.2,1);
    }
    .menu-toggle.shifted { left: calc(var(--sb-width) + 12px); }
    .burger { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .burger span { display: block; width: 16px; height: 1.5px; background: var(--sb-text); border-radius: 2px; }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.2);
      z-index: 500; opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .overlay.visible { opacity: 1; pointer-events: all; }

    .content { margin-left: var(--sb-width); transition: margin .3s ease; }
    .content.expanded { margin-left: 0; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(calc(-1 * var(--sb-width))); }
      .sidebar.show { transform: translateX(0); }
      .menu-toggle.shifted { left: 12px; }
      .content { margin-left: 0; }
    }

    /* ── Preview tubitos ── */
    #tubitos-preview {
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 4px;
      min-height: 20px;
      color: #6c757d;
    }
    #tubitos-preview.ok     { color: #198754; }
    #tubitos-preview.erro   { color: #dc3545; }

    /* ── Seção bloqueada ── */
    .secao-bloqueada {
      opacity: 0.45;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuToggle" title="Abrir/fechar menu">
    <div class="burger"><span></span><span></span><span></span></div>
  </button>

  <nav class="sidebar hidden" id="sidebar">
    <div class="sb-header">
      <div>
        <div class="sb-title">Sistema de Campo</div>
        <div class="sb-subtitle">Painel principal</div>
      </div>
      <button class="sb-close" id="sbClose">✕</button>
    </div>

    <nav class="sb-nav">
      <div class="sb-section">Principal</div>
      <a class="sb-link" href="turno.html"><span class="sb-icon">🕒</span> Turno diário</a>
      <a class="sb-link active" href="campo.html"><span class="sb-icon">🏠</span> Campo</a>
      <a class="sb-link" href="tabela-registros.html"><span class="sb-icon">📝</span> Tabela de registros</a>
      <a class="sb-link" href="pendentes.html"><span class="sb-icon">⏳</span> Pendentes</a>
      <a class="sb-link" href="resumo_campo.html"><span class="sb-icon">📊</span> Resumo</a>
      <a class="sb-link" href="historico.html"><span class="sb-icon">📋</span> Histórico</a>
    </nav>

    <div class="sb-divider"></div>
    <div class="sb-footer">
      <button class="sb-logout logout"><span class="sb-icon">🚪</span> Sair</button>
    </div>
  </nav>

  <div class="overlay" id="overlay"></div>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="content container py-4">
    <h3 class="text-center mb-4">REGISTRO DIÁRIO DO SERVIÇO ANTIVETORIAL</h3>

    <form id="registroForm">

      <!-- ── IDENTIFICAÇÃO ── -->
      <div class="row g-2 mb-3">
        <div class="col-md-2">
          <label class="form-label">Nº do Quarteirão</label>
          <input type="text" class="form-control" name="quarteirao">
        </div>
        <div class="col-md-2">
          <label class="form-label">Seq.</label>
          <input type="text" class="form-control" name="sequencia">
        </div>
        <div class="col-md-2">
          <label class="form-label">Lado</label>
          <input type="text" class="form-control" name="lado">
        </div>
        <div class="col-md-5">
          <label class="form-label">Nome do Logradouro</label>
          <input type="text" class="form-control" name="logradouro">
        </div>
        <div class="col-md-2">
          <label class="form-label">Nº</label>
          <input type="text" class="form-control" name="numero">
        </div>
        <div class="col-md-2">
          <label class="form-label">Sequência</label>
          <input type="text" class="form-control" name="sequencia2">
        </div>
        <div class="col-md-3">
          <label class="form-label">Complemento</label>
          <input type="text" class="form-control" name="complemento">
        </div>

        <!-- ── TIPO / SITUAÇÃO DO IMÓVEL ── -->
        <div class="col-md-3">
          <label class="form-label fw-semibold">Tipo / Situação do Imóvel</label>
          <select class="form-select" name="tipo_imovel" id="tipoImovel">
            <optgroup label="Residência">
              <option value="R">R — Residência</option>
              <option value="R-F">R-F — Residência Fechada</option>
            </optgroup>
            <optgroup label="Comércio">
              <option value="C">C — Comércio</option>
              <option value="C-F">C-F — Comércio Fechado</option>
            </optgroup>
            <optgroup label="Terreno Baldio">
              <option value="TB">TB — Terreno Baldio</option>
              <option value="TB-F">TB-F — Terreno Baldio Fechado</option>
            </optgroup>
            <optgroup label="Ponto Estratégico">
              <option value="PE">PE — Ponto Estratégico</option>
              <option value="PE-F">PE-F — Ponto Estratégico Fechado</option>
            </optgroup>
            <optgroup label="Outro">
              <option value="O">O — Outro</option>
              <option value="O-F">O-F — Outro Fechado</option>
            </optgroup>
            <optgroup label="Pendência">
              <!--
                RECUSA: morador presente mas não permite a visita.
                Contabilizado em Pendência > Recusa no resumo.
                Campos de depósito/tratamento são bloqueados automaticamente.
              -->
              <option value="RECUSA">Recusa do Morador</option>
            </optgroup>
          </select>
          <div id="tipoAviso" class="form-text mt-1"></div>
        </div>

        <div class="col-md-4">
          <label class="form-label">Horário de entrada</label>
          <input type="time" class="form-control" name="horario_entrada">
        </div>
      </div>

      <!-- ── DEPÓSITOS INSPECIONADOS ── -->
      <!--
        Bloco bloqueado automaticamente quando tipo_imovel é Fechado ou Recusa,
        pois o imóvel não foi acessado.
      -->
      <div id="blocoVistoria">
        <h5 class="mt-4">Depósitos Inspecionados</h5>
        <div class="row g-2" id="secaoDepositos">
          <div class="col">
            <label class="form-label">A1</label>
            <input type="number" class="form-control" name="a1" min="0" value="0">
          </div>
          <div class="col">
            <label class="form-label">A2</label>
            <input type="number" class="form-control" name="a2" min="0" value="0">
          </div>
          <div class="col">
            <label class="form-label">B</label>
            <input type="number" class="form-control" name="b" min="0" value="0">
          </div>
          <div class="col">
            <label class="form-label">C</label>
            <input type="number" class="form-control" name="c" min="0" value="0">
          </div>
          <div class="col">
            <label class="form-label">D1</label>
            <input type="number" class="form-control" name="d1" min="0" value="0">
          </div>
          <div class="col">
            <label class="form-label">D2</label>
            <input type="number" class="form-control" name="d2" min="0" value="0">
          </div>
          <div class="col">
            <label class="form-label">E</label>
            <input type="number" class="form-control" name="e" min="0" value="0">
          </div>
        </div>

        <div class="row g-2 mt-3">
          <div class="col-md-3">
            <label class="form-label">Depósitos Eliminados</label>
            <input type="number" class="form-control" name="depositos_eliminados" min="0" value="0">
          </div>

          <div class="col-md-3">
            <label class="form-label">Imóveis Insp. L1 (Perifocal)</label>
            <select class="form-select" name="insp_l1">
              <option value="N">N — Não</option>
              <option value="X">X — Sim</option>
            </select>
          </div>

          <!-- ── AMOSTRAS / TUBITOS ── -->
          <!--
            Tubitos = Amostra Final − Amostra Inicial.
            O campo "qtd_tubitos" é readonly e calculado automaticamente.
            É esse valor que o resumo-campo.js soma para o total de tubitos.
          -->
          <div class="col-md-2">
            <label class="form-label">Nº Amostra Inicial</label>
            <input type="number" class="form-control" name="amostra_inicial"
                   id="amIni" min="0" value="0">
          </div>
          <div class="col-md-2">
            <label class="form-label">Nº Amostra Final</label>
            <input type="number" class="form-control" name="amostra_final"
                   id="amFim" min="0" value="0">
          </div>
          <div class="col-md-2">
            <label class="form-label">
              Qtd. de Tubitos
              <span class="text-muted fw-normal" style="font-size:0.75rem;">(auto)</span>
            </label>
            <input type="number" class="form-control bg-light fw-bold" name="qtd_tubitos"
                   id="qtdTubitos" min="0" value="0" readonly
                   title="Calculado automaticamente: Amostra Final − Amostra Inicial">
            <div id="tubitos-preview">—</div>
          </div>
        </div>

        <!-- ── TRATAMENTO ── -->
        <h5 class="mt-4">Tratamento</h5>
        <div class="row g-2">
          <div class="col-md-3">
            <label class="form-label">Im. Trat. Focal</label>
            <select class="form-select" name="im_trat">
              <option value="N">N — Não</option>
              <option value="X">X — Sim</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Qtde. (Gramas)</label>
            <input type="number" class="form-control" name="queda_gramas" min="0" value="0">
          </div>
          <div class="col-md-3">
            <label class="form-label">Qtde. Dep. Trat.</label>
            <input type="number" class="form-control" name="qtd_dep_trat" min="0" value="0">
          </div>
        </div>
      </div><!-- /blocoVistoria -->

      <!-- ── INFORMAÇÕES (sempre visível) ── -->
      <div class="row g-2 mt-3">
        <div class="col-md-12">
          <label class="form-label">Informações / Observações</label>
          <textarea class="form-control" name="informacao" rows="2"
                    placeholder="Observações gerais sobre o imóvel ou a visita..."></textarea>
        </div>
      </div>

      <div class="row g-2 mt-4">
        <div class="col-12 text-end">
          <button type="submit" class="btn btn-primary px-4">Salvar Registro</button>
        </div>
      </div>

    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.1/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="../js/db.js"></script>
  <script type="module" src="../js/turno-guard.js"></script>
  <script type="module" src="../js/registros.js"></script>

  <script>
  /* ── SIDEBAR ── */
  const sidebar = document.getElementById('sidebar');
  const toggle  = document.getElementById('menuToggle');
  const overlay = document.getElementById('overlay');
  const content = document.querySelector('.content');

  function openMenu() {
    sidebar.classList.remove('hidden');
    sidebar.classList.add('show');
    overlay.classList.add('visible');
    if (window.innerWidth > 768) {
      toggle.classList.add('shifted');
      content?.classList.remove('expanded');
    }
  }
  function closeMenu() {
    sidebar.classList.add('hidden');
    sidebar.classList.remove('show');
    overlay.classList.remove('visible');
    toggle.classList.remove('shifted');
    content?.classList.add('expanded');
  }
  toggle.addEventListener('click', () =>
    sidebar.classList.contains('hidden') ? openMenu() : closeMenu()
  );
  overlay.addEventListener('click', closeMenu);
  document.getElementById('sbClose').addEventListener('click', closeMenu);
  document.querySelector('.logout').addEventListener('click', () => {
    setTimeout(() => { localStorage.clear(); window.location.href = 'login.html'; }, 2000);
  });

  /* ────────────────────────────────────────────────────────────
     TIPO DO IMÓVEL
     — Fechado (sufixo -F) ou Recusa: bloqueia o bloco de vistoria
       pois o imóvel não foi acessado, zerando os campos.
     — Normal: libera o bloco normalmente.
  ──────────────────────────────────────────────────────────── */
  const tipoSelect  = document.getElementById('tipoImovel');
  const tipoAviso   = document.getElementById('tipoAviso');
  const blocoVist   = document.getElementById('blocoVistoria');

  const MENSAGENS = {
    'R-F':    '⚠️ Imóvel fechado — registrado como pendente.',
    'C-F':    '⚠️ Imóvel fechado — registrado como pendente.',
    'TB-F':   '⚠️ Imóvel fechado — registrado como pendente.',
    'PE-F':   '⚠️ Imóvel fechado — registrado como pendente.',
    'O-F':    '⚠️ Imóvel fechado — registrado como pendente.',
    'RECUSA': '🚫 Recusa do morador — registrado como pendente.',
  };

  function isBloqueado(val) {
    return val.endsWith('-F') || val === 'RECUSA';
  }

  function atualizarTipo() {
    const val      = tipoSelect.value;
    const bloquear = isBloqueado(val);

    // Aviso
    tipoAviso.textContent = MENSAGENS[val] || '';
    tipoAviso.className   = 'form-text mt-1 ' +
      (val === 'RECUSA' ? 'text-danger' : bloquear ? 'text-warning' : '');

    // Bloqueia/libera bloco de vistoria
    if (bloquear) {
      blocoVist.classList.add('secao-bloqueada');
      // Zera todos os inputs numéricos do bloco
      blocoVist.querySelectorAll('input[type="number"]').forEach(i => i.value = 0);
      // Reseta selects
      blocoVist.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
      // Limpa preview de tubitos
      atualizarTubitos();
    } else {
      blocoVist.classList.remove('secao-bloqueada');
    }
  }

  tipoSelect.addEventListener('change', atualizarTipo);

  /* ────────────────────────────────────────────────────────────
     TUBITOS — calculado automaticamente
     Fórmula: qtd_tubitos = amostra_final − amostra_inicial
     Regras:
       • Ambos zero → resultado zero, preview neutro
       • final < inicial → inválido, aviso de erro, value = 0
       • final >= inicial → calcula e exibe preview verde
  ──────────────────────────────────────────────────────────── */
  const amIni      = document.getElementById('amIni');
  const amFim      = document.getElementById('amFim');
  const qtdTub     = document.getElementById('qtdTubitos');
  const tubPreview = document.getElementById('tubitos-preview');

  function atualizarTubitos() {
    const ini = parseInt(amIni.value, 10) || 0;
    const fim = parseInt(amFim.value, 10) || 0;

    // Ambos zerados
    if (ini === 0 && fim === 0) {
      qtdTub.value          = 0;
      tubPreview.textContent = '—';
      tubPreview.className   = '';
      amFim.classList.remove('is-invalid');
      return;
    }

    // Final menor que inicial → erro
    if (fim < ini) {
      qtdTub.value           = 0;
      tubPreview.textContent = '⚠️ Amostra final menor que a inicial';
      tubPreview.className   = 'erro';
      amFim.classList.add('is-invalid');
      return;
    }

    // Cálculo correto
    amFim.classList.remove('is-invalid');
    const total = fim - ini;
    qtdTub.value          = total;
    tubPreview.textContent = `✓ ${total} tubito${total !== 1 ? 's' : ''} coletado${total !== 1 ? 's' : ''}`;
    tubPreview.className   = 'ok';
  }

  amIni.addEventListener('input', atualizarTubitos);
  amFim.addEventListener('input', atualizarTubitos);
  </script>
</body>
</html>
