<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro do Turno Diário</title>
  <link rel="manifest" href="../../manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    :root {
  --sb-width: 260px;
  --sb-accent: #4f6ef7;
  --sb-accent-light: #eef1ff;
  --sb-border: #e2e8f0;
  --sb-text: #2d3748;
  --sb-muted: #718096;
}

.sidebar {
  width: var(--sb-width);
  background: #fff;
  border-right: 0.5px solid var(--sb-border);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  transform: translateX(0);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  z-index: 1000;
}
.sidebar.hidden { transform: translateX(calc(-1 * var(--sb-width))); }

.sb-header {
  padding: 1.25rem 1rem 1rem;
  border-bottom: 0.5px solid var(--sb-border);
  display: flex; align-items: center; gap: 10px;
}
.sb-title  { font-size: 14px; font-weight: 500; }
.sb-subtitle { font-size: 11px; color: var(--sb-muted); }
.sb-close {
  margin-left: auto; width: 28px; height: 28px;
  border-radius: 6px; border: 0.5px solid var(--sb-border);
  background: transparent; cursor: pointer; color: var(--sb-muted);
}
.sb-close:hover { background: var(--sb-accent-light); color: var(--sb-accent); }

.sb-section {
  padding: .75rem .75rem .25rem;
  font-size: 10px; font-weight: 500;
  letter-spacing: .08em; color: var(--sb-muted); text-transform: uppercase;
}

.sb-nav {
  flex: 1; padding: .5rem .75rem;
  overflow-y: auto; display: flex;
  flex-direction: column; gap: 2px;
}
.sb-link {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px;
  text-decoration: none; color: var(--sb-text);
  font-size: 13px; transition: background .15s, color .15s;
}
.sb-link:hover  { background: var(--sb-accent-light); color: var(--sb-accent); }
.sb-link.active { background: var(--sb-accent-light); color: var(--sb-accent); font-weight: 500; }

.sb-icon {
  width: 28px; height: 28px; border-radius: 6px;
  background: #f1f5f9;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.sb-badge {
  margin-left: auto; background: var(--sb-accent);
  color: #fff; font-size: 10px; padding: 2px 6px;
  border-radius: 20px; font-weight: 500;
}
.sb-divider { height: 0.5px; background: var(--sb-border); margin: .5rem .75rem; }

.sb-footer { padding: .75rem; }
.sb-logout {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px;
  color: #c53030; font-size: 13px; cursor: pointer;
  border: 0.5px solid #fed7d7; background: #fff5f5;
  transition: background .15s; width: 100%;
}
.sb-logout:hover { background: #fed7d7; }

.menu-toggle {
  position: fixed; top: 12px; left: 12px; z-index: 1100;
  width: 40px; height: 40px; border-radius: 10px;
  border: 0.5px solid var(--sb-border); background: #fff;
  cursor: pointer; transition: left .3s cubic-bezier(.4,0,.2,1);
}
.menu-toggle.shifted { left: calc(var(--sb-width) + 12px); }
.burger { display: flex; flex-direction: column; gap: 4px; align-items: center; }
.burger span { display: block; width: 16px; height: 1.5px; background: var(--sb-text); border-radius: 2px; }

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.2);
  z-index: 500; opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
.overlay.visible { opacity: 1; pointer-events: all; }

.content { margin-left: var(--sb-width); transition: margin .3s ease; }
.content.expanded { margin-left: 0; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(calc(-1 * var(--sb-width))); }
  .sidebar.show { transform: translateX(0); }
  .menu-toggle.shifted { left: 12px; }
  .content { margin-left: 0; }
}
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuToggle" title="Abrir/fechar menu">
    <div class="burger"><span></span><span></span><span></span></div>
  </button>

  <nav class="sidebar hidden" id="sidebar">
    <div class="sb-header">
      <div class="sb-logo"><!-- ícone ou logo --></div>
      <div>
        <div class="sb-title">SISAV</div>
        <div class="sb-subtitle">Sistema de Campo</div>
      </div>
      <button class="sb-close" id="sbClose">✕</button>
    </div>

    <nav class="sb-nav">
      <div class="sb-section">Principal</div>
      <a class="sb-link" href="turno.html"><span class="sb-icon">🕒</span> Turno diário</a>
      <a class="sb-link" href="campo.html"><span class="sb-icon">🏠</span> Campo</a>
      <a class="sb-link" href="tabela-registros.html"><span class="sb-icon">📝</span> Tabela de registros</a>
      <a class="sb-link" href="pendentes.html"><span class="sb-icon">⏳</span> Pendentes</a>
      <a class="sb-link" href="resumo_campo.html"><span class="sb-icon">📊</span> Resumo</a>
      <a class="sb-link" href="historico.html"><span class="sb-icon">📋</span> Histórico</a>
    </nav>

    <div class="sb-divider"></div>
    <div class="sb-footer">
      <button class="sb-logout logout"><span class="sb-icon">🚪</span> Sair</button>
    </div>
  </nav>

  <div class="overlay" id="overlay"></div>

  <div class="container">
    <h1>Cadastro do Turno Diário</h1>

    <form id="form-turno">
      <label for="data">Data:</label>
      <input type="date" id="data" name="data" required />

      <label>Município</label>
      <select name="municipio" required>
        <option value="ipiau">Ipiaú</option>
      </select>

      <label>Ciclo/Ano:</label>
      <select name="ciclo" required>
        <option value="">Selecione</option>
        <option value="1">1° Ciclo</option>
        <option value="2">2° Ciclo</option>
        <option value="3">3° Ciclo</option>
        <option value="4">4° Ciclo</option>
        <option value="5">5° Ciclo</option>
        <option value="6">6° Ciclo</option>
      </select>

      <label>Localidade:</label>
      <select name="localidade" required>
        <option value="">Selecione</option>
        <option value="aloiso-corrado">ALOISO CORRADO</option>
        <option value="bela-vista">BELA VISTA</option>
        <option value="centro">CENTRO</option>
        <option value="conceicao">CONCEIÇÃO</option>
        <option value="constanca">CONSTANÇA</option>
        <option value="corrego-de-pedras">CORREGO DE PEDRAS</option>
        <option value="emburrado">EMBURRADO</option>
        <option value="euclides-neto">EUCLIDES NETO</option>
        <option value="fazenda-do-povo">FAZENDA DO POVO</option>
        <option value="nossa-senhora-aparecida">NOSSA SENHORA APARECIDA</option>
        <option value="salvador-da-mata">SALVADOR DA MATA</option>
        <option value="urbis">URBIS</option>
      </select>

      <label>Categoria da Localidade:</label>
      <select name="categoria_localidade" required>
        <option value="bairro">BAIRRO</option>
        <option value="povoado">POVOADO</option>
      </select>

      <label>Zona:</label>
      <select name="zona" required>
        <option value="urbana">URBANA</option>
        <option value="rural">RURAL</option>
      </select>

      <label>Atividade:</label>
      <select name="atividade" required>
        <option value="1-RA">1-RA - Revisão de área</option>
        <option value="2-LI+T">2-LI+T - Levantamento de índice + Tratamento</option>
        <option value="3-PE">3-PE - Ponto Estratégico</option>
        <option value="4-T">4-T - Tratamento</option>
      </select>


      <label>Nome do Agente:</label>
      <input type="text" name="agente" id="agente" placeholder="Seu nome" required>

      <button type="submit" class="btnSalvarTurno">Salvar Turno</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.1/dist/dexie.min.js"></script>
  <script type="module" src="../js/turno.js"></script>
  <script>
  const sidebar    = document.getElementById('sidebar');
  const toggle     = document.getElementById('menuToggle');
  const overlay    = document.getElementById('overlay');
  const content    = document.querySelector('.content');

  function openMenu() {
    sidebar.classList.remove('hidden');
    sidebar.classList.add('show');
    overlay.classList.add('visible');
    if (window.innerWidth > 768) {
      toggle.classList.add('shifted');
      content?.classList.remove('expanded');
    }
  }
  function closeMenu() {
    sidebar.classList.add('hidden');
    sidebar.classList.remove('show');
    overlay.classList.remove('visible');
    toggle.classList.remove('shifted');
    content?.classList.add('expanded');
  }

  toggle.addEventListener('click', () =>
    sidebar.classList.contains('hidden') ? openMenu() : closeMenu()
  );
  overlay.addEventListener('click', closeMenu);
  document.getElementById('sbClose').addEventListener('click', closeMenu);

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }
  document.querySelector('.logout').addEventListener('click', () => {
    setTimeout(() => {
      logout();
    }, 2000);

  });
  </script>
  <script>
    let deferredPrompt;
    const btnInstalar = document.getElementById('btnInstalar');

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("../../service-worker.js", { scope: '../../' })
          .then(reg => {
            console.log("✅ Service Worker registrado");
          })
          .catch(err => console.error("❌ Falha ao registrar SW:", err));
      });
    }

    // Captura o evento de instalação do Chrome
    window.addEventListener('beforeinstallprompt', (e) => {
      console.log("✅ O sistema está pronto para ser instalado!");
      // Previne o banner automático (opcional)
      e.preventDefault();
      // Guarda o evento para usar depois
      deferredPrompt = e;
      // Mostra o botão no menu lateral
      btnInstalar.style.display = 'block';
    });

    // Ação ao clicar no botão de instalar
    btnInstalar.addEventListener('click', async () => {
      if (deferredPrompt) {
        // Mostra o prompt de instalação
        deferredPrompt.prompt();
        // Espera a resposta do usuário
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`Usuário respondeu à instalação: ${outcome}`);
        // Limpa o prompt para não ser usado de novo
        deferredPrompt = null;
        // Esconde o botão após a escolha
        btnInstalar.style.display = 'none';
      }
    });

    // Esconde o botão se o app já estiver instalado
    window.addEventListener('appinstalled', () => {
      console.log('🎉 PWA instalado com sucesso!');
      btnInstalar.style.display = 'none';
    });
  </script>

</body>
</html>
